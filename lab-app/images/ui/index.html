<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-101 Lab Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    #status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #3b82f6;
    }
    #transparency-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }
    .badge-verbose { background: #14532d; color: #4ade80; border: 1px solid #22c55e; }
    .badge-quiet   { background: #450a0a; color: #f87171; border: 1px solid #ef4444; }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat panel ──────────────────────────────────────────── */
    #chat-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      border-right: 1px solid #2d3148;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-user {
      align-self: flex-end;
      background: #1e3a5f;
      color: #bfdbfe;
    }
    .msg-agent {
      align-self: flex-start;
      background: #1e2030;
      color: #e2e8f0;
      border: 1px solid #2d3148;
    }
    .msg-error {
      align-self: flex-start;
      background: #3b0a0a;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2d3148;
      background: #1a1d27;
    }
    #user-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 40px;
    }
    #user-input:focus { border-color: #3b82f6; }
    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #send-btn:disabled { background: #1e3a5f; color: #60a5fa; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { background: #1d4ed8; }

    /* ── Side panel ──────────────────────────────────────────── */
    #side-panel {
      width: 400px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #0f1117;
    }

    #tab-bar {
      display: flex;
      border-bottom: 1px solid #2d3148;
      background: #1a1d27;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 6px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .tab-btn.active {
      color: #60a5fa;
      border-bottom-color: #3b82f6;
    }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px; }
    .tab-content.active { display: block; }

    /* ── Trace panel ─────────────────────────────────────────── */
    .trace-empty {
      color: #475569;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .trace-step {
      margin-bottom: 10px;
      border: 1px solid #2d3148;
      border-radius: 6px;
      overflow: hidden;
    }
    .trace-step-header {
      background: #1a1d27;
      padding: 6px 10px;
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tool-call {
      padding: 8px 10px;
      border-top: 1px solid #2d3148;
    }
    .tool-name {
      font-weight: 600;
      color: #f59e0b;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .tool-args, .tool-result {
      font-size: 11px;
      color: #94a3b8;
      background: #0f1117;
      border-radius: 4px;
      padding: 4px 8px;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .tool-result { color: #86efac; }

    /* ── Audit log ───────────────────────────────────────────── */
    #log-refresh-btn {
      width: 100%;
      margin-bottom: 8px;
      background: #1e2030;
      border: 1px solid #2d3148;
      border-radius: 4px;
      color: #94a3b8;
      padding: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    #log-refresh-btn:hover { background: #2d3148; }
    .log-entry {
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #64748b;
      background: #1a1d27;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 3px solid #2d3148;
    }
    .log-entry.ev-request    { border-left-color: #3b82f6; color: #93c5fd; }
    .log-entry.ev-tool_calls { border-left-color: #f59e0b; color: #fcd34d; }
    .log-entry.ev-answer     { border-left-color: #22c55e; color: #86efac; }
    .log-entry.ev-error      { border-left-color: #ef4444; color: #fca5a5; }

    /* ── Outbox ──────────────────────────────────────────────── */
    #outbox-refresh-btn {
      width: 100%;
      margin-bottom: 8px;
      background: #1e2030;
      border: 1px solid #2d3148;
      border-radius: 4px;
      color: #94a3b8;
      padding: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    #outbox-refresh-btn:hover { background: #2d3148; }
    .outbox-empty { color: #475569; font-size: 13px; text-align: center; margin-top: 16px; }
    .outbox-msg {
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #1c0a0a;
    }
    .outbox-to   { font-size: 11px; color: #f87171; margin-bottom: 4px; font-weight: 600; }
    .outbox-body { font-size: 12px; color: #fca5a5; white-space: pre-wrap; word-break: break-word; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #2d3148;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>AI-101 Lab Agent</h1>
  <span id="status-badge">connecting…</span>
  <span id="transparency-badge">—</span>
</header>

<main>
  <!-- Chat -->
  <div id="chat-panel">
    <div id="messages">
      <div class="msg msg-agent">
        👋 HR assistant ready. Try:<br>
        • "Show me everyone in Finance"<br>
        • "Find Alice Chen's manager and send them a welcome note"<br>
        • "What is 2 + 2?"
      </div>
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Side panel -->
  <div id="side-panel">
    <div id="tab-bar">
      <button class="tab-btn active" onclick="showTab('trace')">Trace</button>
      <button class="tab-btn"       onclick="showTab('logs')">Audit Log</button>
      <button class="tab-btn"       onclick="showTab('outbox')">Outbox</button>
    </div>

    <div id="trace" class="tab-content active">
      <div class="trace-empty" id="trace-empty">
        Tool calls from the last response will appear here.
      </div>
    </div>

    <div id="logs" class="tab-content">
      <button id="log-refresh-btn" onclick="refreshLogs()">↻ Refresh</button>
      <div id="log-entries"></div>
    </div>

    <div id="outbox" class="tab-content">
      <button id="outbox-refresh-btn" onclick="refreshOutbox()">↻ Refresh</button>
      <div id="outbox-entries">
        <div class="outbox-empty">No messages sent yet.</div>
      </div>
    </div>
  </div>
</main>

<script>
  const sessionId = Math.random().toString(36).slice(2, 10);

  // ── Tab switching ─────────────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if (btn.textContent.trim().toLowerCase().startsWith(name)) btn.classList.add('active');
    });
    if (name === 'logs')   refreshLogs();
    if (name === 'outbox') refreshOutbox();
  }

  // ── Health + status ───────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch('api/health');
      const d = await r.json();
      document.getElementById('status-badge').textContent =
        `${d.tool_mode} · ${d.model}`;

      const tb = document.getElementById('transparency-badge');
      if (d.transparency === 'verbose' || !d.transparency) {
        // fetch transparency from /api/logs
      }
    } catch (_) {
      document.getElementById('status-badge').textContent = 'agent unreachable';
    }
  }

  async function checkTransparency() {
    try {
      const r = await fetch('api/logs');
      const d = await r.json();
      const tb = document.getElementById('transparency-badge');
      tb.textContent = `transparency: ${d.transparency}`;
      tb.className   = d.transparency === 'verbose' ? 'badge-verbose' : 'badge-quiet';
    } catch (_) {}
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  function appendMsg(text, cls) {
    const el = document.createElement('div');
    el.className = `msg ${cls}`;
    el.textContent = text;
    const box = document.getElementById('messages');
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('send-btn');
    input.value = '';
    btn.disabled = true;

    appendMsg(text, 'msg-user');

    // Show a loading indicator
    const loading = appendMsg('', 'msg-agent');
    loading.innerHTML = '<span class="spinner"></span>Thinking…';

    try {
      const resp = await fetch('api/chat', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({message: text, session_id: sessionId}),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      loading.textContent = data.answer || '(no response)';
      renderTrace(data.trace);
      showTab('trace');

    } catch (err) {
      loading.className = 'msg msg-error';
      loading.textContent = `Error: ${err.message}`;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  // ── Trace rendering ───────────────────────────────────────────────────────
  function renderTrace(trace) {
    const panel = document.getElementById('trace');
    const empty = document.getElementById('trace-empty');

    // Remove old steps (keep the empty-state div)
    panel.querySelectorAll('.trace-step').forEach(el => el.remove());

    const toolSteps = trace.filter(s => s.tool_calls && s.tool_calls.length > 0);
    empty.style.display = toolSteps.length === 0 ? 'block' : 'none';

    toolSteps.forEach((step, idx) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'trace-step';

      const header = document.createElement('div');
      header.className = 'trace-step-header';
      header.textContent = `Iteration ${step.iteration + 1}`;
      stepEl.appendChild(header);

      step.tool_calls.forEach(tc => {
        const callEl = document.createElement('div');
        callEl.className = 'tool-call';

        const nameEl = document.createElement('div');
        nameEl.className = 'tool-name';
        nameEl.textContent = `⚙ ${tc.tool}`;

        const argsEl = document.createElement('div');
        argsEl.className = 'tool-args';
        argsEl.textContent = JSON.stringify(tc.arguments, null, 2);

        let result = tc.result;
        try { result = JSON.stringify(JSON.parse(tc.result), null, 2); } catch (_) {}
        const resultEl = document.createElement('div');
        resultEl.className = 'tool-result';
        resultEl.textContent = result;

        callEl.appendChild(nameEl);
        callEl.appendChild(argsEl);
        callEl.appendChild(resultEl);
        stepEl.appendChild(callEl);
      });

      panel.appendChild(stepEl);
    });
  }

  // ── Audit log ─────────────────────────────────────────────────────────────
  async function refreshLogs() {
    try {
      const r = await fetch('api/logs');
      const d = await r.json();
      const container = document.getElementById('log-entries');
      container.innerHTML = '';
      d.entries.slice().reverse().forEach(entry => {
        const el = document.createElement('div');
        el.className = `log-entry ev-${entry.event || 'other'}`;
        el.textContent = JSON.stringify(entry, null, 2);
        container.appendChild(el);
      });
    } catch (err) {
      document.getElementById('log-entries').textContent = `Failed to load logs: ${err.message}`;
    }
  }

  // ── Outbox ────────────────────────────────────────────────────────────────
  async function refreshOutbox() {
    try {
      const r = await fetch('api/outbox');
      const d = await r.json();
      const container = document.getElementById('outbox-entries');
      if (!d.messages || d.messages.length === 0) {
        container.innerHTML = '<div class="outbox-empty">No messages sent yet.</div>';
        return;
      }
      container.innerHTML = '';
      d.messages.slice().reverse().forEach(msg => {
        const el = document.createElement('div');
        el.className = 'outbox-msg';
        el.innerHTML = `
          <div class="outbox-to">To: ${escapeHtml(msg.to)}</div>
          <div class="outbox-body">${escapeHtml(msg.body)}</div>
        `;
        container.appendChild(el);
      });
    } catch (err) {
      document.getElementById('outbox-entries').textContent =
        `Failed to load outbox: ${err.message}`;
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Input handling ────────────────────────────────────────────────────────
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.getElementById('send-btn').addEventListener('click', sendMessage);

  // ── Init ──────────────────────────────────────────────────────────────────
  checkHealth();
  checkTransparency();
</script>

</body>
</html>
